<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IntentLoop — DevOps Triage Agent</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c2330;
    --border: #2b3441;
    --text: #e6edf3;
    --muted: #8b97a7;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --green: #2ea043;
    --green-bg: #16331f;
    --yellow: #d29922;
    --yellow-bg: #3a2e0c;
    --red: #f85149;
    --red-bg: #3a1414;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 20px 64px; }

  /* Header */
  header { border-bottom: 1px solid var(--border); padding-bottom: 18px; margin-bottom: 24px; }
  .brand { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .logo {
    font-family: var(--mono); font-weight: 700; font-size: 1.5rem; letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo .dot { color: var(--accent); }
  .tagline {
    font-size: 1.05rem; color: var(--accent); font-weight: 600;
    border-left: 3px solid var(--accent); padding-left: 10px;
  }
  .subcopy { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

  /* Layout */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px;
  }
  .card h2 {
    margin: 0 0 14px; font-size: 0.78rem; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); font-weight: 600;
  }

  /* Input */
  label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 6px; }
  textarea {
    width: 100%; min-height: 110px; resize: vertical;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; font-family: var(--mono); font-size: 0.9rem;
  }
  textarea:focus { outline: none; border-color: var(--accent-dim); }

  .row { display: flex; gap: 12px; align-items: flex-end; margin-top: 14px; flex-wrap: wrap; }
  .field { flex: 1; min-width: 140px; }
  select {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 10px;
    font-family: var(--mono); font-size: 0.9rem;
  }
  select:focus { outline: none; border-color: var(--accent-dim); }

  button {
    font-family: var(--sans); font-size: 0.92rem; font-weight: 600;
    border: none; border-radius: 8px; padding: 11px 18px; cursor: pointer;
    transition: filter 0.15s, transform 0.05s;
  }
  button:active { transform: translateY(1px); }
  .btn-run {
    background: var(--accent-dim); color: #fff; flex-shrink: 0;
  }
  .btn-run:hover { filter: brightness(1.15); }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }

  .presets { margin-top: 18px; }
  .presets .pl { font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; }
  .chips { display: flex; flex-direction: column; gap: 8px; }
  .chip {
    text-align: left; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); font-weight: 500; font-size: 0.86rem;
    padding: 10px 12px; line-height: 1.4;
  }
  .chip:hover { border-color: var(--accent-dim); background: #20283600; background: #202836; }
  .chip .tag {
    display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 1px 7px;
    border-radius: 20px; margin-right: 8px; vertical-align: middle;
  }
  .tag.safe { background: var(--green-bg); color: #5fd778; }
  .tag.danger { background: var(--red-bg); color: #ff8a82; }
  .tag.edge { background: var(--yellow-bg); color: #e6c057; }

  /* Result */
  #result { margin-top: 20px; }
  .placeholder {
    text-align: center; color: var(--muted); padding: 48px 20px;
    border: 1px dashed var(--border); border-radius: 10px; font-size: 0.9rem;
  }

  /* Verdict badge */
  .badge {
    border-radius: 12px; padding: 22px 24px; margin-bottom: 20px;
    border: 2px solid; display: flex; align-items: center; gap: 16px;
  }
  .badge .ico { font-size: 2.4rem; line-height: 1; }
  .badge .txt { flex: 1; }
  .badge .headline { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.3px; }
  .badge .sub { font-size: 0.85rem; opacity: 0.85; margin-top: 2px; font-family: var(--mono); }
  .badge.green  { border-color: var(--green);  background: var(--green-bg);  color: #7ee397; }
  .badge.yellow { border-color: var(--yellow); background: var(--yellow-bg); color: #f0cf6b; }
  .badge.red    { border-color: var(--red);    background: var(--red-bg);    color: #ff9b94; }

  .result-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
  @media (max-width: 820px) { .result-grid { grid-template-columns: 1fr; } }

  /* Radar */
  .radar-wrap { display: flex; flex-direction: column; align-items: center; }
  .radar-wrap svg { width: 100%; max-width: 300px; height: auto; }
  .score-pill {
    margin-top: 6px; font-family: var(--mono); font-size: 0.85rem; color: var(--muted);
  }
  .score-pill b { color: var(--text); font-size: 1.05rem; }

  /* Reasons */
  .reasons { list-style: none; margin: 0; padding: 0; }
  .reasons li {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px; margin-bottom: 8px; font-family: var(--mono); font-size: 0.84rem;
    display: flex; gap: 8px; align-items: flex-start;
  }
  .reasons li::before { content: "▸"; color: var(--accent); flex-shrink: 0; }

  .axes-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 0.82rem; }
  .axes-table td { padding: 4px 0; }
  .axes-table td:first-child { color: var(--muted); }
  .axes-table td:last-child { text-align: right; font-weight: 600; }

  /* Meta */
  .meta {
    margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 8px 20px; font-family: var(--mono);
    font-size: 0.74rem; color: var(--muted);
  }
  .meta span b { color: var(--text); font-weight: 600; }
  .nv { display: inline-block; padding: 1px 7px; border-radius: 20px; font-size: 0.72rem; }
  .nv.t { background: var(--yellow-bg); color: #e6c057; }
  .nv.f { background: var(--green-bg); color: #5fd778; }

  /* Loading / error */
  .loading { text-align: center; padding: 40px 20px; color: var(--muted); }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; margin: 0 auto 14px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    border: 1px solid var(--red); background: var(--red-bg); color: #ff9b94;
    border-radius: 10px; padding: 16px 18px; font-size: 0.9rem;
  }
  .error-box .et { font-weight: 700; margin-bottom: 4px; }
  .error-box code { font-family: var(--mono); font-size: 0.82rem; color: #ffc9c5; }

  footer { margin-top: 40px; text-align: center; color: var(--muted); font-size: 0.78rem; }
  footer code { font-family: var(--mono); color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="logo">IntentLoop<span class="dot">_</span></span>
      <span class="tagline">賢く動く、より、賢く止まる</span>
    </div>
    <div class="subcopy">DevOps Triage Agent — インシデント自律トリアージ × verify-before-trust ゲート。安全な対処は自律実行、危険操作は止めて人間にエスカレ。</div>
  </header>

  <div class="grid">
    <!-- INPUT -->
    <section class="card">
      <h2>① アラート入力</h2>
      <label for="alert">インシデント / アラート内容</label>
      <textarea id="alert" placeholder="例: APIのp99レイテンシが通常の1.5倍。ログにエラー増なし"></textarea>

      <div class="row">
        <div class="field">
          <label for="provider">推論プロバイダ</label>
          <select id="provider">
            <option value="mock" selected>mock（オフライン・無料）</option>
            <option value="gemini">gemini（要APIキー）</option>
          </select>
        </div>
        <button class="btn-run" id="run">▶ トリアージ実行</button>
      </div>

      <div class="presets">
        <div class="pl">デモシナリオ（クリックで投入）</div>
        <div class="chips" id="presets"></div>
      </div>
    </section>

    <!-- RESULT -->
    <section class="card">
      <h2>② トリアージ判定</h2>
      <div id="result">
        <div class="placeholder">アラートを入力して「トリアージ実行」を押すと、ここに判定が表示されます。</div>
      </div>
    </section>
  </div>

  <footer>
    HFE 6軸スコアリング → verify-before-trust ゲート → ATP 永続化 / 監査ログ &nbsp;·&nbsp;
    <code>POST /triage</code> &nbsp;·&nbsp; intentloop-harness
  </footer>
</div>

<script>
"use strict";

const PRESETS = [
  { kind: "safe",   label: "安全寄り",
    text: "APIのp99レイテンシが通常の1.5倍。ログにエラー増なし" },
  { kind: "danger", label: "危険",
    text: "決済サービスがエラー率急増。直前デプロイをすぐ本番ロールバックすべき" },
  { kind: "danger", label: "危険",
    text: "全ノードCPU 95%。オートスケールを無効化して手動で再起動を流す" },
  { kind: "edge",   label: "際どい",
    text: "バッチjobが2時間ストール。再実行をトリガーする" },
];

const AXES = [
  { key: "accuracy",    jp: "accuracy / 正確性" },
  { key: "consistency", jp: "consistency / 一貫性" },
  { key: "risk",        jp: "risk / リスク" },
  { key: "novelty",     jp: "novelty / 新規性" },
  { key: "feasibility", jp: "feasibility / 実行可能性" },
  { key: "divergence",  jp: "divergence / 発散度" },
];

const VERDICT = {
  SAFE_AUTO_ACT:         { cls: "green",  ico: "✅", headline: "安全：自律実行OK" },
  SAFE_AUTO_ACT_MONITOR: { cls: "yellow", ico: "⚠️", headline: "監視付きで実行" },
  ESCALATE_TO_HUMAN:     { cls: "red",    ico: "⛔", headline: "危険：人間の判断が必要" },
};

const $ = (id) => document.getElementById(id);

// Render presets
(function renderPresets() {
  const box = $("presets");
  PRESETS.forEach((p) => {
    const b = document.createElement("button");
    b.className = "chip";
    b.innerHTML = `<span class="tag ${p.kind}">${p.label}</span>${p.text}`;
    b.addEventListener("click", () => { $("alert").value = p.text; $("alert").focus(); });
    box.appendChild(b);
  });
})();

// ---- SVG radar chart (6 axes, no library) ----
function radarSVG(vector) {
  const size = 280, cx = size / 2, cy = size / 2, R = 100;
  const n = AXES.length;
  const ang = (i) => (-Math.PI / 2) + (i * 2 * Math.PI / n);
  const pt = (i, r) => [cx + r * Math.cos(ang(i)), cy + r * Math.sin(ang(i))];

  let g = "";
  // grid rings
  [0.25, 0.5, 0.75, 1].forEach((f) => {
    const pts = AXES.map((_, i) => pt(i, R * f).map((v) => v.toFixed(1)).join(",")).join(" ");
    g += `<polygon points="${pts}" fill="none" stroke="#2b3441" stroke-width="1"/>`;
  });
  // spokes + labels
  AXES.forEach((ax, i) => {
    const [ex, ey] = pt(i, R);
    g += `<line x1="${cx}" y1="${cy}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="#2b3441" stroke-width="1"/>`;
    const [lx, ly] = pt(i, R + 22);
    const anchor = Math.abs(lx - cx) < 5 ? "middle" : (lx < cx ? "end" : "start");
    const val = vector[ax.key];
    g += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" fill="#8b97a7" font-size="10" font-family="ui-monospace,monospace" text-anchor="${anchor}" dominant-baseline="middle">${ax.key}</text>`;
    g += `<text x="${lx.toFixed(1)}" y="${(ly + 12).toFixed(1)}" fill="#e6edf3" font-size="10" font-weight="700" font-family="ui-monospace,monospace" text-anchor="${anchor}" dominant-baseline="middle">${val.toFixed(2)}</text>`;
  });
  // data polygon
  const dpts = AXES.map((ax, i) => pt(i, R * Math.max(0, Math.min(1, vector[ax.key]))).map((v) => v.toFixed(1)).join(",")).join(" ");
  g += `<polygon points="${dpts}" fill="rgba(88,166,255,0.22)" stroke="#58a6ff" stroke-width="2"/>`;
  AXES.forEach((ax, i) => {
    const [px, py] = pt(i, R * Math.max(0, Math.min(1, vector[ax.key])));
    g += `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="3" fill="#58a6ff"/>`;
  });
  return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HFE 6軸スコア レーダーチャート">${g}</svg>`;
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

function renderResult(d) {
  const v = VERDICT[d.recommendation] || { cls: "yellow", ico: "❔", headline: d.recommendation || "不明" };
  const vec = d.hfe_vector || {};

  const reasons = (d.gate_reasons && d.gate_reasons.length)
    ? `<ul class="reasons">${d.gate_reasons.map((r) => `<li>${esc(r)}</li>`).join("")}</ul>`
    : `<p style="color:var(--muted);font-size:.85rem;font-family:var(--mono)">（理由情報なし）</p>`;

  const axesRows = AXES.map((ax) =>
    `<tr><td>${ax.jp}</td><td>${vec[ax.key] != null ? vec[ax.key].toFixed(3) : "—"}</td></tr>`
  ).join("");

  const nv = d.needs_verification === true
    ? `<span class="nv t">needs_verification: true</span>`
    : d.needs_verification === false
      ? `<span class="nv f">needs_verification: false</span>`
      : "";

  const radar = d.hfe_vector ? radarSVG(vec) : `<p style="color:var(--muted)">ベクトルなし</p>`;

  $("result").innerHTML = `
    <div class="badge ${v.cls}">
      <div class="ico">${v.ico}</div>
      <div class="txt">
        <div class="headline">${esc(v.headline)}</div>
        <div class="sub">gate: ${esc(d.gate_verdict || "—")} · recommendation: ${esc(d.recommendation || "—")}</div>
      </div>
    </div>

    <div class="result-grid">
      <div class="radar-wrap">
        ${radar}
        <div class="score-pill">HFE score: <b>${d.hfe_score != null ? d.hfe_score : "—"}</b></div>
      </div>
      <div>
        <h2 style="margin-top:0">ゲート判定理由</h2>
        ${reasons}
        <table class="axes-table">${axesRows}</table>
      </div>
    </div>

    <div class="meta">
      <span>ATP: <b>${esc(d.atp_id || "—（未永続化）")}</b></span>
      <span>attempts: <b>${d.attempts != null ? d.attempts : "—"}</b></span>
      <span>session: <b>${esc(d.session_id || "—")}</b></span>
      ${nv}
    </div>
  `;
}

function renderError(msg, detail) {
  $("result").innerHTML = `
    <div class="error-box">
      <div class="et">⛔ ${esc(msg)}</div>
      ${detail ? `<code>${esc(detail)}</code>` : ""}
      <div style="margin-top:10px;color:#ffb3ae;font-size:.82rem">
        provider=gemini は API キーが必要です。キー未設定や API 障害時は provider=mock で再実行してください。
      </div>
    </div>`;
}

async function run() {
  const alert = $("alert").value.trim();
  const provider = $("provider").value;
  if (!alert) { $("alert").focus(); return; }

  $("run").disabled = true;
  $("result").innerHTML = `<div class="loading"><div class="spinner"></div>HFE スコアリング → ゲート評価中…</div>`;

  try {
    const res = await fetch("/triage", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ alert, provider }),
    });

    let data;
    try { data = await res.json(); }
    catch { renderError("サーバ応答の解析に失敗しました", `HTTP ${res.status}`); return; }

    if (!res.ok || data.ok === false) {
      renderError("トリアージに失敗しました", data && data.error ? data.error : `HTTP ${res.status}`);
      return;
    }
    renderResult(data);
  } catch (e) {
    renderError("サーバに接続できませんでした", e && e.message ? e.message + "（node server.js が起動しているか確認）" : "");
  } finally {
    $("run").disabled = false;
  }
}

$("run").addEventListener("click", run);
$("alert").addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") run();
});
</script>
</body>
</html>
